# このファイルは scripts/update-note-template.mjs により自動生成される。
# タグの選択肢を手で編集しないこと(次回の同期で上書きされる)。
name: "📝 Note"
description: "TILノートを投稿する(学習中の生メモ。整形不要)"
title: "note: "
labels: ["note"]
body:
  - type: textarea
    id: body
    attributes:
      label: 本文
      description: "学んだことを書く。整形不要。箇条書き1行でもよい"
      placeholder: |
        今日学んだこと...
    validations:
      required: true
  - type: dropdown
    id: tags
    attributes:
      label: タグ
      description: "既存タグから選ぶ(表記ゆれ防止のため、ここにあるものは必ずここから選ぶ)"
      multiple: true
      options:
        - "CI/CD"
        - "Coroutines"
        - "Docker"
        - "Kotlin"
        - "Meta"
        - "monitoring"
        - "非同期"
    validations:
      required: false
  - type: input
    id: new_tags
    attributes:
      label: 新規タグ
      description: "上の選択肢に無いタグだけ、カンマ区切りで(例: GraphQL, gRPC)"
      placeholder: "GraphQL, gRPC"
    validations:
      required: false
  - type: input
    id: source
    attributes:
      label: 出典
      description: "書籍名・URL・動画名など(任意)"
      placeholder: "書籍: Kotlin in Action 2nd"
    validations:
      required: false
