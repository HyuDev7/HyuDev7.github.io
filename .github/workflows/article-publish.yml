name: Publish article from Issue

on:
  issue_comment:
    types: [created]

jobs:
  publish:
    # セキュリティ要件: リポジトリオーナーの /publish コメントのみ。PRコメントは除外。
    # note-capture.yml / note-append.yml と同じ理由で必須。
    if: >
      github.event.issue.pull_request == null &&
      contains(github.event.issue.labels.*.name, 'article') &&
      github.event.comment.user.login == 'HyuDev7' &&
      startsWith(github.event.comment.body, '/publish')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Publish article from issue
        id: publish
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/publish-article-from-issue.mjs

      # 新規タグが増えた可能性があるため、Issueフォームのタグ選択肢を同期
      # (GITHUB_TOKEN push では sync-note-template.yml が発火しないため inline で行う)
      - name: Sync issue template tags
        run: node scripts/update-note-template.mjs

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add "${{ steps.publish.outputs.path }}" .github/ISSUE_TEMPLATE/
          git commit -m "post: ${{ github.event.issue.title }} (#${{ github.event.issue.number }})"
          git push

      - name: Trigger deploy
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            const slug = '${{ steps.publish.outputs.slug }}'
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `公開しました: https://${context.repo.owner}.github.io/blog/${slug}`,
            })
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            })
