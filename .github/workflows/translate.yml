name: Translate blog posts to English

on:
  push:
    branches: [main]
    paths:
      - 'content/blog/*.md'

  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed Japanese posts
        id: changed
        run: |
          # 前のコミットと比較して変更された content/blog/*.md を取得
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'content/blog/*.md' | grep -v '^content/blog/en/' || true)
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED"

      - name: Translate changed posts
        if: steps.changed.outputs.files != ''
        run: |
          echo "Translating changed files: $CHANGED_FILES"
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}

